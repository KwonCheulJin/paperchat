name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: read

# 동일 브랜치/태그 연속 push 시 이전 빌드 자동 취소
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    env:
      # CI 환경에서 incremental 빌드는 캐시 메타데이터 충돌로 히트율만 떨어뜨림.
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      # binaries-latest 릴리즈 asset 의 id·size 를 cache key 로 사용.
      # 바이너리 재업로드 시 asset.id 가 바뀌므로 자동 무효화됨.
      - name: Compute binaries cache key
        id: bkey
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $info = gh api repos/${{ github.repository }}/releases/tags/binaries-latest | ConvertFrom-Json
          $asset = $info.assets | Where-Object { $_.name -eq 'paperchat-binaries.zip' }
          "key=binaries-$($asset.id)-$($asset.size)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Cache pre-built binaries
        id: binaries-cache
        uses: actions/cache@v4
        with:
          path: desktop/src-tauri/binaries
          key: ${{ steps.bkey.outputs.key }}

      - name: Download pre-built binaries
        if: steps.binaries-cache.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ github.repository }}
          tag: binaries-latest
          fileName: paperchat-binaries.zip
          out-file-path: .

      - name: Extract binaries
        if: steps.binaries-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path desktop/src-tauri/binaries -Force | Out-Null
          Expand-Archive -Path paperchat-binaries.zip -DestinationPath desktop/src-tauri/binaries -Force
          # 하위 호환: 아키텍처 접미사가 붙은 구형 zip 도 접미사 제거 (v0.7 이하)
          $legacy1 = "desktop/src-tauri/binaries/llama-server-x86_64-pc-windows-msvc.exe"
          if (Test-Path $legacy1) { Rename-Item $legacy1 "llama-server.exe" -Force }
          $legacy2 = "desktop/src-tauri/binaries/backend-x86_64-pc-windows-msvc.exe"
          if (Test-Path $legacy2) { Rename-Item $legacy2 "paperchat-server.exe" -Force }
          Write-Host "Binaries extracted:"
          Get-ChildItem desktop/src-tauri/binaries | Select-Object Name, Length

      - name: Install Node dependencies
        working-directory: desktop
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm install

      # MSI 는 배포 채널에 사용하지 않으므로 NSIS 만 생성 → 빌드 시간 단축
      - name: Build Tauri app
        working-directory: desktop
        run: pnpm tauri build --bundles nsis

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperchat-installer-${{ github.sha }}
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
