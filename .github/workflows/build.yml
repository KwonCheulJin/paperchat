name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Download pre-built binaries
        uses: robinraju/release-downloader@v1
        with:
          repository: KwonCheulJin/paperchat
          tag: binaries-latest
          fileName: paperchat-binaries.zip
          out-file-path: .

      - name: Extract binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path desktop/src-tauri/binaries -Force | Out-Null
          Expand-Archive -Path paperchat-binaries.zip -DestinationPath desktop/src-tauri/binaries -Force
          # tauri.conf.json resources는 아키텍처 접미사 없는 이름을 기대함
          Rename-Item "desktop/src-tauri/binaries/llama-server-x86_64-pc-windows-msvc.exe" "llama-server.exe"
          Rename-Item "desktop/src-tauri/binaries/backend-x86_64-pc-windows-msvc.exe" "paperchat-server.exe"
          Write-Host "Binaries extracted:"
          Get-ChildItem desktop/src-tauri/binaries | Select-Object Name, Length

      - name: Install Node dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: desktop
        run: pnpm tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperchat-installer-${{ github.sha }}
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
